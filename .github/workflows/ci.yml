name: ci

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout arcane-demos
        uses: actions/checkout@v4

      # crates/arcane-demo uses path ../../../arcane (parent of repo root). actions/checkout cannot leave the workspace, so clone explicitly.
      - name: Clone arcane (path dependency)
        run: git clone --depth 1 https://github.com/brainy-bots/arcane.git "${GITHUB_WORKSPACE}/../arcane"

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features
